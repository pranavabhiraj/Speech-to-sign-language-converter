<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Audio to Sign Language</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<h1>Audio to Sign Language</h1>

<div class="controls">
<button id="startBtn">Start Mic</button>
<button id="stopBtn">Stop Mic</button>
</div>

<div class="panel">
<label>Transcript</label>
<textarea id="transcript" rows="3" placeholder="Speak or type here..."></textarea>
<button id="processBtn">Process</button>
</div>

<div class="panel">
<label>Detected words</label>
<ul id="wordList"></ul>
</div>

<div class="panel">
<video id="player" width="640" height="360" controls autoplay></video>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
